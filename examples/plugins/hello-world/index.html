<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e1e1e;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
    }
    .clock {
      font-size: 48px;
      font-weight: 200;
      font-variant-numeric: tabular-nums;
      color: #61dafb;
    }
    .greeting {
      font-size: 14px;
      color: #888;
    }
    .date {
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="clock" id="clock">--:--:--</div>
  <div class="greeting" id="greeting">Hello from Smoke Plugins!</div>
  <div class="date" id="date"></div>

  <script>
    function update() {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleTimeString(undefined, { hour12: false });
      document.getElementById('date').textContent =
        now.toLocaleDateString(undefined, {
          weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });

      const hour = now.getHours();
      let greeting = 'Good evening';
      if (hour < 12) greeting = 'Good morning';
      else if (hour < 17) greeting = 'Good afternoon';
      document.getElementById('greeting').textContent = greeting + ' from Smoke Plugins!';
    }

    update();
    setInterval(update, 1000);

    // Listen for messages from the host
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'smoke:init') {
        // Plugin initialized by the Smoke host
        window.parent.postMessage({ type: '__ready' }, '*');
      }
    });
  </script>
</body>
</html>
